<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recent History</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212; /* Spotify dark background */
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 1.8em;
      margin-bottom: 15px;
      color: #1DB954; /* Spotify green */
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background-color: #181818;
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
    }

    #player {
      margin-top: 20px;
    }

    iframe {
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Recent Search History</h1>
  <ul id="historyList"></ul>

  <div id="player"></div>

  <script>
    // Get search history from localStorage
    const history = JSON.parse(localStorage.getItem("history")) || [];
    const list = document.getElementById("historyList");

    // Show each search term in the list
    history.forEach(item => {
      const li = document.createElement("li");
      li.textContent = item;
      list.appendChild(li);
    });

    // Get the last played track ID
    const currentTrack = localStorage.getItem("currentTrack");
    if (currentTrack) {
      document.getElementById("player").innerHTML = `
        <iframe src="https://open.spotify.com/embed/track/${currentTrack}" 
          width="300" height="80" allow="encrypted-media"></iframe>`;
    }
  </script>
</body>
</html>
